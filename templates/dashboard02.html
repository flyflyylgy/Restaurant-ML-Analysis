<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生心理健康分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            color: #666;
            font-size: 16px;
        }
        .chart-container {
            width: 100%;
            height: 700px;
            margin-bottom: 40px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        .chart-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 16px;
            color: #666;
        }
        .error {
            text-align: center;
            padding: 50px;
            font-size: 16px;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>学生心理健康分析</h1>
            <p>自杀念头与抑郁症关系及影响因素分析</p>
        </div>

        <!-- 箱线图容器 -->
        <div class="chart-container">
            <div class="chart-title">各因素与抑郁症关系（箱线图）</div>
            <div id="boxplotChart" style="width: 100%; height: 600px;"></div>
        </div>

        <!-- 矩形树图容器 -->
        <div class="chart-container">
            <div class="chart-title">抑郁症影响因素分析（矩形树图）</div>
            <div id="treemapChart" style="width: 100%; height: 600px;"></div>
        </div>
    </div>

    <script>
        // 初始化图表
        const boxplotChart = echarts.init(document.getElementById('boxplotChart'));
        const treemapChart = echarts.init(document.getElementById('treemapChart'));

        // 加载数据
        function loadData() {
            // 箱线图数据
            fetch('/api/boxplot')
                .then(response => {
                    if (!response.ok) throw new Error('网络响应不正常');
                    return response.json();
                })
                .then(data => renderBoxplot(data))
                .catch(error => {
                    console.error('加载箱线图数据失败:', error);
                    document.getElementById('boxplotChart').innerHTML =
                        '<div class="error">箱线图数据加载失败: ' + error.message + '</div>';
                });

            // 矩形树图数据
            fetch('/api/treemap')
                .then(response => {
                    if (!response.ok) throw new Error('网络响应不正常');
                    return response.json();
                })
                .then(data => {
                    if (data.error) throw new Error(data.error);
                    renderTreemap(data);
                })
                .catch(error => {
                    console.error('加载矩形树图数据失败:', error);
                    document.getElementById('treemapChart').innerHTML =
                        '<div class="error">矩形树图数据加载失败: ' + error.message + '</div>';
                });
        }

        // 渲染箱线图
        function renderBoxplot(data) {
            const series = [];
            const xAxisData = data.factors.map(factor => {
                // 属性名称映射
                const nameMap = {
                    '学业压力': '学业压力',
                    '财务压力': '财务压力',
                    '学习满意度': '学习满意度',
                    '工作学习时间': '工作/学习时间',
                    '睡眠小时数': '睡眠时长',
                    '饮食习惯': '饮食习惯',
                    '是否有过自杀念头': '自杀念头'
                };
                return nameMap[factor] || factor;
            });

            // 准备箱线图数据
            ['患抑郁症', '未患抑郁症'].forEach(group => {
                series.push({
                    name: group,
                    type: 'boxplot',
                    data: data.factors.map(factor => {
                        const values = data.data[`${factor}_${group}`] || [];
                        return calcBoxplotData(values);
                    }),
                    itemStyle: {
                        color: group === '患抑郁症' ? '#e74c3c' : '#2ecc71',
                        borderColor: group === '患抑郁症' ? '#c0392b' : '#27ae60',
                        borderWidth: 2
                    },
                    emphasis: {
                        itemStyle: {
                            shadowBlur: 10,
                            shadowOffsetX: 0,
                            shadowColor: 'rgba(0, 0, 0, 0.5)'
                        }
                    }
                });
            });

            const option = {
                tooltip: {
                    trigger: 'item',
                    axisPointer: { type: 'shadow' },
                    formatter: function(params) {
                        const stats = params.value;
                        const factor = xAxisData[params.dataIndex];
                        return `
                            <strong>${params.seriesName} - ${factor}</strong><br/>
                            最小值: ${stats[0].toFixed(2)}<br/>
                            下四分位数: ${stats[1].toFixed(2)}<br/>
                            中位数: ${stats[2].toFixed(2)}<br/>
                            上四分位数: ${stats[3].toFixed(2)}<br/>
                            最大值: ${stats[4].toFixed(2)}
                        `;
                    }
                },
                legend: {
                    data: ['患抑郁症', '未患抑郁症'],
                    top: 30,
                    textStyle: {
                        fontSize: 14
                    }
                },
                grid: {
                    top: 80,
                    left: 50,
                    right: 50,
                    bottom: 100
                },
                xAxis: {
                    type: 'category',
                    data: xAxisData,
                    axisLabel: {
                        fontSize: 14,
                        rotate: 30,
                        interval: 0,
                        margin: 20,
                        formatter: function(value) {
                            return value.split('').join('\n');
                        }
                    },
                    axisTick: {
                        alignWithLabel: true
                    }
                },
                yAxis: {
                    type: 'value',
                    name: '数值',
                    nameLocation: 'middle',
                    nameGap: 40,
                    axisLabel: {
                        fontSize: 14,
                        margin: 10
                    },
                    splitLine: {
                        lineStyle: {
                            type: 'dashed'
                        }
                    }
                },
                series: series
            };

            boxplotChart.setOption(option);
        }

        // 计算箱线图数据
        function calcBoxplotData(data) {
            if (!data || data.length === 0) return [0, 0, 0, 0, 0];

            const sorted = [...data].sort((a, b) => a - b);
            const q1 = d3.quantile(sorted, 0.25);
            const median = d3.quantile(sorted, 0.5);
            const q3 = d3.quantile(sorted, 0.75);
            const iqr = q3 - q1;
            const min = Math.max(sorted[0], q1 - 1.5 * iqr);
            const max = Math.min(sorted[sorted.length - 1], q3 + 1.5 * iqr);

            return [min, q1, median, q3, max];
        }

        // 渲染矩形树图
        function renderTreemap(data) {
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: function(info) {
                        const value = info.value;
                        const treePathInfo = info.treePathInfo;
                        const path = [];

                        for (let i = 1; i < treePathInfo.length; i++) {
                            path.push(treePathInfo[i].name);
                        }

                        return [
                            '<div style="font-size:14px;color:#666;font-weight:400;line-height:1;">',
                            path.join(' > '),
                            '</div>',
                            '重要性占比: ' + value + '%'
                        ].join('');
                    }
                },
                series: [{
                    name: '抑郁症影响因素',
                    type: 'treemap',
                    visibleMin: 1,
                    data: data.treemap_data.children,
                    breadcrumb: {
                        show: true,
                        height: 30,
                        itemStyle: {
                            color: '#eee',
                            textStyle: {
                                fontSize: 12
                            }
                        }
                    },
                    label: {
                        show: true,
                        formatter: '{b}',
                        fontSize: 12
                    },
                    upperLabel: {
                        show: true,
                        height: 30
                    },
                    levels: [
                        {
                            itemStyle: {
                                borderColor: '#555',
                                borderWidth: 2,
                                gapWidth: 2
                            }
                        },
                        {
                            itemStyle: {
                                borderColor: '#777',
                                borderWidth: 1,
                                gapWidth: 1
                            }
                        }
                    ],
                    itemStyle: {
                        borderColorSaturation: 0.6
                    },
                    emphasis: {
                        label: {
                            show: true,
                            fontSize: 14
                        }
                    }
                }]
            };

            treemapChart.setOption(option);
        }

        // 窗口大小变化时重新调整图表大小
        window.addEventListener('resize', function() {
            boxplotChart.resize();
            treemapChart.resize();
        });

        // 页面加载完成后获取数据
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
