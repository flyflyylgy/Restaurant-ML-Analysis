<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>汽车品牌销售趋势</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .chart-container { width: 800px; margin: 0 auto; }
        .chart {
            height: 400px;
            border-left: 1px solid #ccc;
            border-bottom: 1px solid #ccc;
            position: relative;
            margin-top: 40px;
        }
        .line {
            stroke: #3498db;
            stroke-width: 3;
            fill: none;
        }
        .point { fill: #e74c3c; cursor: pointer; }
        .axis { color: #666; }
        .tooltip {
            position: absolute;
            padding: 8px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 4px;
            pointer-events: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <h2>2024年汽车品牌季度销售趋势（单位：万辆）</h2>
        <div class="chart" id="chart"></div>
    </div>

    <script>
        // 1. 模拟数据（品牌: [Q1,Q2,Q3,Q4]）
        const salesData = {
            "比亚迪": [45, 62, 78, 95],
            "特斯拉": [38, 52, 65, 80],
            "大众": [42, 55, 70, 85],
            "丰田": [40, 53, 68, 82]
        };

        // 2. 创建折线图
        const chart = document.getElementById('chart');
        const brands = Object.keys(salesData);
        const quarters = ["第一季度", "第二季度", "第三季度", "第四季度"];

        // 计算比例尺
        const maxValue = Math.max(...Object.values(salesData).flat());
        const height = 400;
        const width = 700;
        const step = width / (quarters.length - 1);

        // 3. 绘制坐标轴
        const axisHTML = `
            <div style="position: absolute; bottom: 0; width: 100%; display: flex; justify-content: space-around;">
                ${quarters.map(q => `<div class="axis">${q}</div>`).join('')}
            </div>
            <div style="position: absolute; left: -30px; top: 0; height: 100%; display: flex; flex-direction: column; justify-content: space-between;">
                <div>${maxValue}</div>
                <div>${maxValue/2}</div>
                <div>0</div>
            </div>
        `;
        chart.innerHTML = axisHTML;

        // 4. 为每个品牌绘制折线
        const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f39c12'];
        brands.forEach((brand, i) => {
            const points = salesData[brand].map((value, j) => {
                const x = j * step;
                const y = height - (value / maxValue * height);
                return {x, y, value};
            });

            // 绘制线段
            const path = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            path.setAttribute('width', '100%');
            path.setAttribute('height', '100%');
            path.style.position = 'absolute';
            path.style.top = '0';
            path.style.left = '0';

            const pathData = `M${points[0].x},${points[0].y} ` +
                points.slice(1).map(p => `L${p.x},${p.y}`).join(' ');

            const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
            line.setAttribute('d', pathData);
            line.classList.add('line');
            line.style.stroke = colors[i];
            path.appendChild(line);
            chart.appendChild(path);

            // 绘制数据点
            points.forEach((point, j) => {
                const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                dot.setAttribute('cx', point.x);
                dot.setAttribute('cy', point.y);
                dot.setAttribute('r', 5);
                dot.classList.add('point');
                dot.style.fill = colors[i];
                dot.dataset.tip = `${brand}<br>${quarters[j]}: ${point.value}万辆`;

                dot.addEventListener('mouseover', function(e) {
                    const tooltip = document.createElement('div');
                    tooltip.className = 'tooltip';
                    tooltip.innerHTML = this.dataset.tip;
                    document.body.appendChild(tooltip);

                    const moveHandler = (e) => {
                        tooltip.style.left = (e.pageX + 10) + 'px';
                        tooltip.style.top = (e.pageY + 10) + 'px';
                    };

                    this.addEventListener('mousemove', moveHandler);
                    this.addEventListener('mouseout', () => {
                        document.body.removeChild(tooltip);
                        this.removeEventListener('mousemove', moveHandler);
                    }, {once: true});
                });

                path.appendChild(dot);
            });
        });

        // 5. 添加图例
        const legend = document.createElement('div');
        legend.style.display = 'flex';
        legend.style.justifyContent = 'center';
        legend.style.marginTop = '20px';
        legend.style.gap = '20px';

        brands.forEach((brand, i) => {
            const item = document.createElement('div');
            item.style.display = 'flex';
            item.style.alignItems = 'center';

            const colorBox = document.createElement('div');
            colorBox.style.width = '15px';
            colorBox.style.height = '15px';
            colorBox.style.backgroundColor = colors[i];
            colorBox.style.marginRight = '5px';

            item.appendChild(colorBox);
            item.appendChild(document.createTextNode(brand));
            legend.appendChild(item);
        });

        chart.parentNode.appendChild(legend);
    </script>
</body>
</html>
