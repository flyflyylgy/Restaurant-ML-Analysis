<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>年龄性别学业压力分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            background-color: #f5f7fa;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .chart-container {
            box-shadow: 0 4px 12px 0 rgba(0,0,0,0.1);
            border-radius: 8px;
            background: white;
            padding: 15px;
            margin: 0 auto;
            width: 900px;
            height: 500px;
        }
    </style>
</head>
<body>
    <div id="chart" class="chart-container"></div>

    <script>
        // 直接使用模板变量，无需JSON.parse
        var ages = {{ ages|safe }};
        var maleStress = {{ male_stress|safe }};
        var femaleStress = {{ female_stress|safe }};

        // 初始化图表
        var chart = echarts.init(document.getElementById('chart'));

        // 配置项
        var option = {
            title: {
                text: '各个年龄，不同性别的平均学业压力',
                left: 'center'
            },
            tooltip: {
                trigger: 'axis',
                formatter: '年龄: {b0}<br/>平均压力: {c0}'
            },
            legend: {
                data: ['男', '女'],
                right: 10
            },
            xAxis: {
                type: 'category',
                data: ages,
                name: '年龄',
                axisLabel: {
                    rotate: 30,
                    fontSize: 10
                }
            },
            yAxis: {
                type: 'value',
                name: '平均学业压力',
                min: 0,
                max: 5
            },
            grid: {
                left: '3%',
                right: '4%',
                bottom: '15%',
                containLabel: true
            },
            series: [
                {
                    name: '男',
                    type: 'bar',
                    data: maleStress,
                    barWidth: '30%',
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(
                            0, 0, 0, 1,
                            [
                                {offset: 0, color: '#83bff6'},
                                {offset: 0.5, color: '#188df0'},
                                {offset: 1, color: '#0050a0'}
                            ]
                        )
                    },
                    label: {
                        show: true,
                        position: 'top',
                        backgroundColor: 'rgba(255,255,255,0.7)',
                        padding: [2, 4],
                        borderRadius: 3
                    }
                },
                {
                    name: '女',
                    type: 'bar',
                    data: femaleStress,
                    barWidth: '30%',
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(
                            0, 0, 0, 1,
                            [
                                {offset: 0, color: '#ff7faa'},
                                {offset: 0.5, color: '#ff2d6d'},
                                {offset: 1, color: '#cc0052'}
                            ]
                        )
                    },
                    label: {
                        show: true,
                        position: 'top',
                        backgroundColor: 'rgba(255,255,255,0.7)',
                        padding: [2, 4],
                        borderRadius: 3
                    }
                }
            ]
        };

        chart.setOption(option);
        window.addEventListener('resize', function() {
            chart.resize();
        });
    </script>
</body>
</html>
